# Railway config for the API service. Point a Railway service at this repo
# with root directory = "/" to pick this up.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "uv run python scripts/bootstrap_prod_db.py"
startCommand = "sh -c 'uv run --no-dev uvicorn procure_agent.api:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
